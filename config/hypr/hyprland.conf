# Hyprland Configuration
# ======================
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# 🎛️ Available Modifiers:
# SHIFT CAPS CTRL/CONTROL ALT MOD2 MOD3 SUPER/WIN/LOGO/MOD4 MOD5

# ──────────────
# 🖥️ Applications
# ──────────────

# Defaults
$terminal = kitty
$fileManager = thunar
$menu = fuzzel #anyrun
$altmenu = fuzzel

# Starup
exec once = uwsm app -- hypridle
exec once = uwsm app -- xrandr --output DP-1 --primary
exec once = uwsm app -- hyprctl dispatch workspace 1
exec once = uwsm app -- bash ~/.config/hypr/start.sh

# Key bindings for applications
bind = Super, O, exec, uwsm app -- pkill fuzzel || cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind = Super+Shift, C, exec, uwsm app -- hyprpicker -a

# Zoom
bind = SUPER, mouse_down, exec, uwsm app -- hyprctl keyword cursor:zoom_factor $(hyprctl -j getoption cursor:zoom_factor | jq -r '.float * (2 | sqrt)')
bind = SUPER, mouse_up, exec, uwsm app -- hyprctl keyword cursor:zoom_factor $(hyprctl -j getoption cursor:zoom_factor | jq -r '[.float / (2 | sqrt), 1] | max')
bind = SUPER, mouse:274, exec, uwsm app -- hyprctl keyword cursor:zoom_factor 1 # Reset zoom

# ──────────────
# 🌐 Language and Keyboard
# ──────────────

input {
  kb_layout = us,ua
  kb_options = grp:caps_toggle
  follow_mouse = 1
  special_fallthrough = true

  touchpad {
    natural_scroll = yes
    disable_while_typing = true
    clickfinger_behavior = true
    scroll_factor = 0.5
  }

  sensitivity = 0
}


# Bindings for fcitx
bind =, F1, exec, uwsm app -- fcitx5-remote -c && hyprctl keyword input:kb_layout us,ua
bind =, F2, exec, uwsm app -- hyprctl keyword input:kb_layout us && fcitx5-remote -o 
bind = Shift Alt Ctrl, F2, exec, uwsm app -- fcitx5-remote -c && hyprctl keyword input:kb_layout gr

exec-once=fcitx5-remote -r
exec-once=fcitx5 -d --replace
exec-once=fcitx5-remote -r

