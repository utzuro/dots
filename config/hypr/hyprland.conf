# ──────────────
# 🔧 Bindings
# ──────────────

$mainMod = SUPER

# Windows Navigations
bind=$mainMod,H,movefocus,l
bind=$mainMod,J,movefocus,d
bind=$mainMod,K,movefocus,u
bind=$mainMod,L,movefocus,r

bind=SUPERSHIFT,H,movewindow,l
bind=SUPERSHIFT,J,movewindow,d
bind=SUPERSHIFT,K,movewindow,u
bind=SUPERSHIFT,L,movewindow,r

# Window Resizing
bind = ALT, R, submap, resize

submap = resize
binde = , l, resizeactive, 30 0
binde = , h, resizeactive, -30 0
binde = , k, resizeactive, 0 -30
binde = , j, resizeactive, 0 30

bind = , catchall, submap, reset # exit on any other key
submap = reset

# Actions
bind = $mainMod, return, exec, uwsm app -- $terminal
bind = $mainMod, t, exec, uwsm app -- $terminal
bind = alt, t, exec, uwsm app -- $terminal

bind = $mainMod, E, exec, uwsm app -- $fileManager

bind = $mainMod+SHIFT, Q, exec, uwsm app -- ~/.config/hypr/kill.sh

bind = $mainMod+SHIFT, R, exec, uwsm app -- hyprland reload
bind = alt, R, exec, uwsm app -- hyprland reload

bind = $mainMod+SHIFT, E, exit, 
bind = $mainMod+SHIFT, M, exec, uwsm app -- hyprlock
bind = $mainMod, V, togglefloating
bind = $mainMod, Y, togglesplit

# Workspace
workspace = web
bind = $mainMod, w, workspace, web

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = alt, 1, workspace, 11
bind = alt, 2, workspace, 12
bind = alt, 3, workspace, 13
bind = alt, 4, workspace, 14
bind = alt, 5, workspace, 15
bind = alt, 6, workspace, 16
bind = alt, 7, workspace, 17
bind = alt, 8, workspace, 18
bind = alt, 9, workspace, 19
bind = alt, 0, workspace, 20

bind = $mainMod+SHIFT, 1, movetoworkspace, 1
bind = $mainMod+SHIFT, 2, movetoworkspace, 2
bind = $mainMod+SHIFT, 3, movetoworkspace, 3
bind = $mainMod+SHIFT, 4, movetoworkspace, 4
bind = $mainMod+SHIFT, 5, movetoworkspace, 5
bind = $mainMod+SHIFT, 6, movetoworkspace, 6
bind = $mainMod+SHIFT, 7, movetoworkspace, 7
bind = $mainMod+SHIFT, 8, movetoworkspace, 8
bind = $mainMod+SHIFT, 9, movetoworkspace, 9
bind = $mainMod+SHIFT, 0, movetoworkspace, 10

bind = alt+SHIFT, 1, movetoworkspace, 11
bind = alt+SHIFT, 2, movetoworkspace, 12
bind = alt+SHIFT, 3, movetoworkspace, 13
bind = alt+SHIFT, 4, movetoworkspace, 14
bind = alt+SHIFT, 5, movetoworkspace, 15
bind = alt+SHIFT, 6, movetoworkspace, 16
bind = alt+SHIFT, 7, movetoworkspace, 17
bind = alt+SHIFT, 8, movetoworkspace, 18
bind = alt+SHIFT, 9, movetoworkspace, 19
bind = alt+SHIFT, 0, movetoworkspace, 20

# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod+SHIFT, S, movetoworkspace, special:magic

# bind = $mainMod, mouse_down, workspace, e+1
# bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Fullscreen
bind = Super, F, fullscreen, 0
# bind = Super+Alt, F, fakefullscreen,
# bind = Super, D, fullscreen, 1

bind = $mainMod, D, exec, uwsm app -- $menu
bind = alt, space, exec, uwsm app -- $altmenu

# ──────────────
# 📸 Screenshots
# ──────────────

$pic_dir = "$HOME/mysticism/i/screens"

$scr_area = file="$pic_dir/scr-$(date +%F_%T).png" && grim -g "$(slurp)" - | magick - -shave 1x1 PNG:- | wl-copy && wl-paste > $file && swappy -f $file -o ${file}-anotated.png
$scr_full = grim - | wl-copy && wl-paste > $pic_dir/scr-$(date +%F_%T).png

bind = SUPER, P, exec, $scr_area
# bind = SHIFT+SUPER, P, exec, uwsm app -- $scr_full

# Recording
bind = Super, R, exec, wf-recorder -g "$(slurp)" -f $pic_dir/rec-$(date +%F_%T).mp4 
# how to stop?

# OCR
# bind = Alt, T, exec, uwsm app -- grim -g "$(slurp $SLURP_ARGS)" "tmp.png" && tesseract "tmp.png" - | wl-copy && rm "tmp.png"
$ocr_area = file="$pic_dir/scr-$(date +%F_%T)_OCRed.png" && grim -g "$(slurp)" - | magick - -shave 1x1 PNG:- | wl-copy && wl-paste > $file && tesseract $file - | wl-copy
bind = Alt+Shift, T, exec, $ocr_area

# ──────────────
# 🎵 Media Controls
# ──────────────

bind = $mainMod, M, exec, uwsm app -- mpc toggle
bind = $mainMod+SHIFT, N, exec, uwsm app -- mu next
bind = $mainMod+SHIFT, P, exec, uwsm app -- mu prev
bind = $mainMod+SHIFT, D, exec, uwsm app -- mu del
# bind = $mainMod, P, exec, uwsm app -- ~/.config/hypr/pause.sh

# Untested
bindl= Super+Shift, N, exec, uwsm app -- playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"`
bindl=, XF86AudioNext, exec, uwsm app -- playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"`
bindl= Super+Shift, B, exec, uwsm app -- playerctl previous
bindl= Super+Shift, P, exec, uwsm app -- playerctl play-pause
bindl=, XF86AudioPlay, exec, uwsm app -- playerctl play-pause

# Audio
bindl = Alt ,XF86AudioMute, exec, uwsm app -- wpctl set-mute @DEFAULT_SOURCE@ toggle
bindl = Super ,XF86AudioMute, exec, uwsm app -- wpctl set-mute @DEFAULT_SOURCE@ toggle
bindl = ,XF86AudioMute, exec, uwsm app -- wpctl set-volume @DEFAULT_AUDIO_SINK@ 0%
bindl = Super+Shift, M, exec, uwsm app -- wpctl set-volume @DEFAULT_AUDIO_SINK@ 0%
bindle =, XF86AudioRaiseVolume, exec, uwsm app -- wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindle =, XF86AudioLowerVolume, exec, uwsm app -- wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- 

# Brightness

# screen
bind = , XF86MonBrightnessUp, exec, uwsm app -- brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, uwsm app -- brightnessctl s 5%-

# keyboard backlight
bind = , XF86KbdBrightness_up , exec, uwsm app -- brightnessctl -d *::kbd_backlight set +33%
bind = super, XF86KbdBrightness_down, exec, uwsm app -- brightnessctl -d *::kbd_backlight set 33%-

# Turn Off Laptop Display on Lid Close
bindl = , switch:on:Lid Switch, exec, uwsm app -- hyprctl dispatch dpms off
bindl = , switch:off:Lid Switch, exec, uwsm app -- hyprctl dispatch dpms on


# ──────────────
# 🖥️ Rendering
# ──────────────

# Monitor setup
# monitor = eDP-1, 3840x2160@120, auto, 2.5, bitdepth,10 #scale 1.6
# monitor = DP-1, highres@highrr, 0x0, 1.5, bitdepth,10 #scale 1.6
# monitor = HDMI-A-1, highres@highrr, -1440x0, 1.5, transform, 1
#monitor = HDMI-A-1, highres@highrr, auto-left, 1, transform, 1
# monitor = HDMI-A-1, highres@highrr, ajjj-left, 1.6, transform, 0
# monitor = HDMI-A-1, 4096x2160@120, auto, 2, bitdepth,10
# monitor = DP-2, highres@highrr, auto, 2, bitdepth,10

monitor = DP-2, 3840x2160@120, auto, 1, transform, 0, bitdepth,10 # main
monitor = HDMI-A-1, 3840x2160@120, auto-right, 1, transform, 0, bitdepth,10 # TV
monitor = DP-1, 3840x2160@60, auto-left, 1, transform, 1, bitdepth,10 # secondary


# NVIDIA settings
opengl {
	nvidia_anti_flicker = true
}

# ──────────────
# 🎨 Visual Settings
# ──────────────

general {
  gaps_in = 0
  gaps_out = 0
  border_size = 0
  col.active_border = rgba(ff00ffee) rgba(8a2be2ee) 45deg
  col.inactive_border = rgba(c070d088)
  layout = dwindle
  allow_tearing = true
}

decoration {
  rounding = 10
  blur {
    enabled = true
    size = 3
    passes = 1
  }
}

# No shadow for tiled windows
windowrule {
  name = windowrule-1
  no_shadow = on
  match:float = 0
}


animations {
  enabled = yes
  bezier = myBezier, 0.05, 0.9, 0.1, 1.05
  animation = windows, 1, 7, myBezier
  animation = windowsOut, 1, 7, default, popin 80%
  animation = border, 1, 10, default
  animation = borderangle, 1, 8, default
  animation = fade, 1, 7, default
  animation = workspaces, 1, 6, default
}

dwindle {
  pseudotile = yes 
  preserve_split = yes
}

misc {
  force_default_wallpaper = 0
  vrr = 1
  vfr = 1
  on_focus_under_fullscreen = 2
  allow_session_lock_restore = true
  initial_workspace_tracking = false
}

# ──────────────
# 🪟 Window Rules
# ──────────────

# Apps
windowrule {
  name = windowrule-2
  tile = on
  match:class = (dev.warp.Warp)
}

windowrule {
  name = windowrule-3
  float = on
  match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
}


# Dialogs
windowrule {
  name = windowrule-4
  float = on
  match:title = ^(Open File)(.*)$
}

windowrule {
  name = windowrule-5
  float = on
  match:title = ^(Select a File)(.*)$
}

windowrule {
  name = windowrule-6
  float = on
  match:title = ^(Choose wallpaper)(.*)$
}

windowrule {
  name = windowrule-7
  float = on
  match:title = ^(Open Folder)(.*)$
}

windowrule {
  name = windowrule-8
  float = on
  match:title = ^(Save As)(.*)$
}

windowrule {
  name = windowrule-9
  float = on
  match:title = ^(Library)(.*)$
}

windowrule {
  name = windowrule-10
  float = on
  match:title = ^(File Upload)(.*)$
}


